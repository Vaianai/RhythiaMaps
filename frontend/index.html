<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythia Maps</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #030712;
        color: #e5e7eb;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      #boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      #boot-card {
        border: 1px solid rgba(139, 92, 246, 0.35);
        background: rgba(17, 24, 39, 0.75);
        border-radius: 16px;
        padding: 16px 20px;
        max-width: 680px;
        width: 100%;
      }

      #boot-error {
        margin-top: 12px;
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.5;
        color: #fecaca;
        background: rgba(127, 29, 29, 0.35);
        border: 1px solid rgba(248, 113, 113, 0.45);
        border-radius: 10px;
        padding: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div id="boot-card">
        <strong>Rhythia Maps</strong>
        <div style="opacity: .85; margin-top: 6px; font-size: 14px;">Loading app...</div>
        <div id="boot-error"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      const showBootError = (message) => {
        const errorBox = document.getElementById('boot-error');
        if (!errorBox) return;
        errorBox.style.display = 'block';
        errorBox.textContent = String(message || 'Unknown startup error');
      };

      window.addEventListener('error', (event) => {
        showBootError(event?.error?.stack || event?.message || 'Runtime error during startup');
      });

      window.addEventListener('unhandledrejection', (event) => {
        showBootError(event?.reason?.stack || event?.reason || 'Unhandled promise rejection during startup');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
